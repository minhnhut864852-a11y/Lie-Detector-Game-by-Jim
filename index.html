<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lie Detector Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===================== -->
    <!-- CINEMATIC OPENING     -->
    <!-- ===================== -->
    <div id="opening-screen">

        <!-- Flashing light bars -->
        <div class="light-bar left-bar"></div>
        <div class="light-bar right-bar"></div>

        <!-- Spotlight circles -->
        <div class="spotlight spot-1"></div>
        <div class="spotlight spot-2"></div>
        <div class="spotlight spot-3"></div>

        <!-- Game show title -->
        <div id="opening-content">
            <div id="opening-subtitle">🎬 Welcome to</div>
            <div id="opening-title">
                <span class="title-word">LIE</span>
                <span class="title-word">DETECTOR</span>
                <span class="title-word">GAME</span>
            </div>
            <div id="opening-tagline">Can you spot the liar? 🕵️</div>
            <button id="skip-btn" onclick="skipOpening()">▶ Start Setup</button>
        </div>

    </div>

    <!-- ===================== -->
    <!-- MAIN GAME SETUP       -->
    <!-- ===================== -->
    <div id="main-content" class="hidden">

        <nav>
            <span class="nav-title">🕵️ Lie Detector Game</span>
            <a href="rules.html" class="nav-btn">📖 Rules</a>
        </nav>

        <div class="container">
            <h1>🎉 Welcome!</h1>
            <p class="subtitle">Add up to 20 players, then start the game.</p>

            <div class="card">
                <h2>👥 Add Players</h2>
                <div id="input-section">
                    <input type="text" id="player-input" placeholder="Enter player name..." />
                    <button id="add-player-btn">Add Player</button>
                </div>
                <ul id="player-list"></ul>
                <p id="player-count">0 / 20 players added</p>
            </div>

            <button id="start-game-btn" class="big-btn">🚀 Start Game</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
