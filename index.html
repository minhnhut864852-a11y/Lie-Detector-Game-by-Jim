<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lie Detector Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation bar -->
    <nav>
        <span class="nav-title">🕵️ Lie Detector Game</span>
        <a href="rules.html" class="nav-btn">📖 Rules</a>
    </nav>

    <!-- Main setup container -->
    <div class="container">
        <h1>🎉 Welcome!</h1>
        <p class="subtitle">Add up to 20 players, then start the game.</p>

        <!-- Add player card -->
        <div class="card">
            <h2>👥 Add Players</h2>
            <div id="input-section">
                <input type="text" id="player-input" placeholder="Enter player name..." />
                <button id="add-player-btn">Add Player</button>
            </div>
            <!-- Player list will appear here -->
            <ul id="player-list"></ul>
            <p id="player-count">0 / 20 players added</p>
        </div>

        <!-- Start game button -->
        <button id="start-game-btn" class="big-btn">🚀 Start Game</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
